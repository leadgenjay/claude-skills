name: notes
description: Interactive markdown review toolkit — open any file in the claude-review web UI to leave inline comments, then have Claude address each thread with edits or replies. Bundles /notes, /cr-review, and /cr-address. Currently macOS Apple Silicon only.
categories:
  - productivity
  - content
tags:
  - review
  - comments
  - markdown
  - editing
  - collaboration
  - feedback
icon: MessageSquare
version: "1.2"
kind: package
# Bootstraps the claude-review CLI binary on first install. Failure is non-fatal:
# the skill files still land on disk and the customer can re-run the installer
# from https://leadgenjay.com/install/claude-review later.
postInstall: command -v claude-review >/dev/null 2>&1 || curl -sSL https://leadgenjay.com/install/claude-review | sh
