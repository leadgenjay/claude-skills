<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=720, height=900" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;900&family=Manrope:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&family=JetBrains+Mono:wght@400;700&display=swap');
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { margin: 0; width: 720px; height: 900px; overflow: hidden; background: #0D0D0D; }

      .scene-content {
        display: flex; flex-direction: column; width: 100%; height: 100%;
        padding: 50px 50px 45px 50px; position: relative; overflow: hidden;
      }

      .top-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 20px; }
      .avatar-lockup { display: flex; align-items: center; gap: 10px; }
      .avatar-img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; object-position: center; border: 2px solid #ED0D51; }
      .avatar-name { font-family: 'Manrope', sans-serif; font-weight: 600; font-size: 15px; color: #fff; line-height: 1.2; }
      .avatar-handle { font-family: 'Manrope', sans-serif; font-weight: 400; font-size: 13px; color: #888; }
      .top-right-label { font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 13px; color: #ED0D51; letter-spacing: 0.12em; text-transform: uppercase; text-align: right; line-height: 1.3; }

      .headline-block { flex: 1; display: flex; flex-direction: column; justify-content: center; margin-top: -10px; }
      .headline { font-family: 'Big Shoulders Display', sans-serif; font-weight: 400; font-size: 98px; line-height: 0.92; letter-spacing: -0.02em; color: #fff; text-transform: uppercase; }
      .accent { color: #ED0D51; }

      .swap-container { margin-top: 12px; position: relative; height: 70px; display: flex; align-items: center; }
      .swap-pill { display: inline-flex; align-items: center; padding: 8px 22px; border-radius: 8px; background: #ED0D51; }
      .swap-text { font-family: 'Big Shoulders Display', sans-serif; font-weight: 400; font-size: 52px; line-height: 1; letter-spacing: -0.01em; color: #fff; text-transform: uppercase; white-space: nowrap; }

      .body-copy { font-family: 'Manrope', sans-serif; font-weight: 400; font-style: italic; font-size: 20px; line-height: 1.5; color: #A8A8A8; margin-top: 24px; max-width: 580px; }

      .cta-pill { display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; border: 2px solid #ED0D51; border-radius: 40px; margin-top: 20px; background: transparent; }
      .cta-text { font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 16px; letter-spacing: 0.1em; text-transform: uppercase; color: #fff; }

      .footer { display: flex; align-items: center; width: 100%; margin-top: auto; padding-top: 12px; }
      .footer-handle { font-family: 'Manrope', sans-serif; font-weight: 600; font-size: 14px; letter-spacing: 0.1em; text-transform: uppercase; color: #888; }
      .footer-progress { display: flex; align-items: center; gap: 12px; flex: 1; margin-left: 16px; }
      .progress-bar { flex: 1; height: 3px; background: #2A2A2A; border-radius: 2px; overflow: hidden; position: relative; }
      .progress-fill { position: absolute; left: 0; top: 0; height: 100%; width: [PROGRESS]%; background: #ED0D51; border-radius: 2px; }
      .page-num { font-family: 'Manrope', sans-serif; font-weight: 600; font-size: 18px; color: #888; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="10" data-width="720" data-height="900">
      <div id="s1" class="clip" data-start="0" data-duration="10" data-track-index="1">
        <div class="scene-content">

          <div class="top-bar" id="top-bar">
            <div class="avatar-lockup">
              <img class="avatar-img" src="assets/avatar.png" alt="" />
              <div>
                <div class="avatar-name">[YOUR_NAME]</div>
                <div class="avatar-handle">[@YOUR_HANDLE]</div>
              </div>
            </div>
            <div class="top-right-label">[PRODUCT_LABEL]</div>
          </div>

          <div class="headline-block">
            <div class="headline" id="headline">
              [HEADLINE_LINE_1]<br/>
              [HEADLINE_LINE_2]<br/>
              [HEADLINE_LINE_3]<br/>
              <span class="accent">[ACCENT_WORD]</span>
            </div>

            <div class="swap-container">
              <div class="swap-pill" id="swap-pill">
                <span class="swap-text" id="swap-text">[SWAP_1]</span>
              </div>
            </div>

            <div class="body-copy" id="body-copy">
              [BODY_COPY]
            </div>

            <div class="cta-pill" id="cta-pill">
              <span class="cta-text">[CTA_TEXT]</span>
            </div>
          </div>

          <div class="footer" id="footer">
            <span class="footer-handle">[@YOUR_HANDLE]</span>
            <div class="footer-progress">
              <div class="progress-bar"><div class="progress-fill"></div></div>
              <span class="page-num">[N]/[TOTAL]</span>
            </div>
          </div>

        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.from("#top-bar", { opacity: 0, y: -20, duration: 0.5, ease: "power3.out" }, 0.15);
      tl.from("#headline", { opacity: 0, x: -40, duration: 0.6, ease: "expo.out" }, 0.3);
      tl.from("#swap-pill", { opacity: 0, scale: 0.8, duration: 0.4, ease: "back.out(1.7)" }, 0.7);
      tl.from("#body-copy", { opacity: 0, y: 25, duration: 0.45, ease: "power2.out" }, 1.0);
      tl.from("#cta-pill", { opacity: 0, y: 20, duration: 0.4, ease: "power3.out" }, 1.2);
      tl.from("#footer", { opacity: 0, duration: 0.4, ease: "sine.out" }, 1.3);

      var words = [
        { text: "[SWAP_1]", bg: "#ED0D51", color: "#111" },
        { text: "[SWAP_2]", bg: "#FFFFFF", color: "#fff" },
        { text: "[SWAP_3]", bg: "#ED0D51", color: "#111" },
        { text: "[SWAP_1]", bg: "#ED0D51", color: "#111" },
        { text: "[SWAP_2]", bg: "#FFFFFF", color: "#fff" },
        { text: "[SWAP_3]", bg: "#ED0D51", color: "#111" },
      ];
      var cd = 0.5, hd = 1.2;
      for (var i = 0; i < words.length; i++) {
        var st = 2.0 + i * (hd + cd);
        if (st > 9) break;
        var w = words[i];
        if (i > 0) {
          tl.to("#swap-text", { opacity: 0, y: -20, duration: 0.2, ease: "power2.in", overwrite: "auto",
            onComplete: (function(word) { return function() { var el = document.getElementById("swap-text"); if (el) el.textContent = word.text; }; })(w)
          }, st);
          tl.to("#swap-pill", { backgroundColor: w.bg, duration: 0.25, ease: "power1.inOut", overwrite: "auto" }, st);
          tl.set("#swap-text", { color: w.color }, st + 0.22);
          tl.to("#swap-text", { opacity: 1, y: 0, duration: 0.25, ease: "power2.out", overwrite: "auto" }, st + 0.25);
        }
      }

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
