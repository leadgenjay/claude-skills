<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=720, height=900" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;900&family=Manrope:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&family=JetBrains+Mono:wght@400;700&display=swap');
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { margin: 0; width: 720px; height: 900px; overflow: hidden; background: #0D0D0D; }

      /* ---- Scene wrapper ---- */
      .scene-content {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
        padding: 60px 50px 50px 50px;
        position: relative;
        overflow: hidden;
      }

      /* ---- Background decoratives ---- */
      .bg-accent-circle {
        position: absolute;
        border-radius: 50%;
        pointer-events: none;
      }
      .bg-circle-1 {
        width: 340px; height: 340px;
        background: radial-gradient(circle, rgba(197,225,0,0.18) 0%, transparent 70%);
        top: -80px; right: -60px;
      }
      .bg-circle-2 {
        width: 200px; height: 200px;
        background: radial-gradient(circle, rgba(168,85,247,0.10) 0%, transparent 70%);
        bottom: 100px; left: -30px;
      }
      .bg-ghost {
        position: absolute;
        font-family: 'Big Shoulders Display', sans-serif;
        font-size: 260px;
        color: rgba(237,13,81,0.06);
        line-height: 1;
        bottom: 100px;
        right: -10px;
        letter-spacing: -0.02em;
        pointer-events: none;
        user-select: none;
      }

      /* ---- Section label ---- */
      .section-label {
        font-family: 'Manrope', sans-serif;
        font-weight: 700;
        font-size: 14px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: #ED0D51;
        margin-bottom: 22px;
      }

      /* ---- Headline ---- */
      .headline {
        font-family: 'Big Shoulders Display', sans-serif;
        font-size: 95px;
        line-height: 0.92;
        letter-spacing: -0.02em;
        color: #FFFFFF;
        text-transform: uppercase;
        margin-bottom: 22px;
      }

      /* ---- Body copy ---- */
      .body-copy {
        font-family: 'Manrope', sans-serif;
        font-weight: 400;
        font-style: italic;
        font-size: 20px;
        line-height: 1.5;
        color: #A8A8A8;
        margin-bottom: 36px;
        max-width: 560px;
      }

      /* ---- Framework rows ---- */
      .framework-rows {
        display: flex;
        flex-direction: column;
        gap: 16px;
        flex: 1;
      }

      .fw-row {
        display: flex;
        align-items: center;
        gap: 16px;
        padding-left: 16px;
        border-left-width: 3px;
        border-left-style: solid;
      }
      .fw-row-hooks  { border-left-color: #ED0D51; }
      .fw-row-bodies { border-left-color: #FFFFFF; }
      .fw-row-ctas   { border-left-color: #FFFFFF; }

      .fw-label {
        font-family: 'Manrope', sans-serif;
        font-weight: 700;
        font-size: 14px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        flex-shrink: 0;
        width: 64px;
      }
      .fw-label-hooks  { color: #ED0D51; }
      .fw-label-bodies { color: #FFFFFF; }
      .fw-label-ctas   { color: #888888; }

      .fw-pills {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        padding: 8px 16px;
        border-radius: 20px;
        font-family: 'Manrope', sans-serif;
        font-weight: 600;
        font-size: 14px;
        line-height: 1;
        white-space: nowrap;
      }
      .pill-lime    { background: #ED0D51; color: #FFFFFF; }
      .pill-purple  { background: #FFFFFF; color: #ffffff; }
      .pill-amber   { background: #FFFFFF; color: #FFFFFF; }

      /* ---- Chevron ---- */
      .swipe-chevron {
        position: absolute;
        right: 22px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 28px;
        color: #888888;
        line-height: 1;
        pointer-events: none;
      }

      /* ---- Footer ---- */
      .footer {
        display: flex;
        align-items: center;
        width: 100%;
        margin-top: 24px;
        flex-shrink: 0;
      }
      .footer-handle {
        font-family: 'Manrope', sans-serif;
        font-weight: 600;
        font-size: 14px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #888888;
      }
      .footer-progress {
        display: flex;
        align-items: center;
        gap: 12px;
        flex: 1;
        margin-left: 16px;
      }
      .progress-bar {
        flex: 1;
        height: 3px;
        background: #2A2A2A;
        border-radius: 2px;
        overflow: hidden;
        position: relative;
      }
      .progress-fill {
        position: absolute;
        left: 0; top: 0;
        height: 100%;
        width: [PROGRESS]%;
        background: #ED0D51;
        border-radius: 2px;
      }
      .page-num {
        font-family: 'Manrope', sans-serif;
        font-weight: 600;
        font-size: 18px;
        color: #888888;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="5" data-width="720" data-height="900">
      <div id="s1" class="clip" data-start="0" data-duration="5" data-track-index="1">
        <div class="scene-content">

          <!-- Background decoratives -->
          <div class="bg-accent-circle bg-circle-1" id="bg-circle-1"></div>
          <div class="bg-accent-circle bg-circle-2" id="bg-circle-2"></div>
          <div class="bg-ghost" id="bg-ghost">[BG_GHOST_TEXT]</div>

          <!-- Section label -->
          <div class="section-label" id="section-label">[SECTION_LABEL]</div>

          <!-- Headline -->
          <div class="headline" id="headline">[HEADLINE_LINE_1]<br/>[HEADLINE_LINE_2]<br/>[HEADLINE_LINE_3]</div>

          <!-- Body copy -->
          <div class="body-copy" id="body-copy">
            [BODY_COPY]
          </div>

          <!-- Framework pill rows -->
          <div class="framework-rows">

            <div class="fw-row fw-row-hooks" id="fw-row-hooks">
              <span class="fw-label fw-label-hooks">[ROW_1_LABEL]</span>
              <div class="fw-pills" id="fw-pills-hooks">
                <span class="pill pill-lime" id="p-h1">[PILL_1_1]</span>
                <span class="pill pill-lime" id="p-h2">[PILL_1_2]</span>
                <span class="pill pill-lime" id="p-h3">[PILL_1_3]</span>
                <span class="pill pill-lime" id="p-h4">[PILL_1_4]</span>
                <span class="pill pill-lime" id="p-h5">[PILL_1_5]</span>
              </div>
            </div>

            <div class="fw-row fw-row-bodies" id="fw-row-bodies">
              <span class="fw-label fw-label-bodies">[ROW_2_LABEL]</span>
              <div class="fw-pills" id="fw-pills-bodies">
                <span class="pill pill-purple" id="p-b1">[PILL_2_1]</span>
                <span class="pill pill-purple" id="p-b2">[PILL_2_2]</span>
                <span class="pill pill-purple" id="p-b3">[PILL_2_3]</span>
              </div>
            </div>

            <div class="fw-row fw-row-ctas" id="fw-row-ctas">
              <span class="fw-label fw-label-ctas">[ROW_3_LABEL]</span>
              <div class="fw-pills" id="fw-pills-ctas">
                <span class="pill pill-amber" id="p-c1">[PILL_3_1]</span>
                <span class="pill pill-amber" id="p-c2">[PILL_3_2]</span>
                <span class="pill pill-amber" id="p-c3">[PILL_3_3]</span>
              </div>
            </div>

          </div>

          <!-- Swipe chevron -->
          <div class="swipe-chevron" id="swipe-chevron">&#10095;</div>

          <!-- Footer -->
          <div class="footer" id="footer">
            <span class="footer-handle">[@YOUR_HANDLE]</span>
            <div class="footer-progress">
              <div class="progress-bar"><div class="progress-fill"></div></div>
              <span class="page-num">[N]/[TOTAL]</span>
            </div>
          </div>

        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Background ambient
      var dur = 5;
      var breathCycles = Math.floor(dur / 2.5) - 1;
      tl.to("#bg-circle-1", { scale: 1.1, duration: 2.5, ease: "sine.inOut", repeat: breathCycles, yoyo: true }, 0.1);
      tl.to("#bg-circle-2", { scale: 1.08, duration: 3, ease: "sine.inOut", repeat: Math.floor(dur / 3) - 1, yoyo: true }, 0.3);
      tl.from("#bg-ghost", { opacity: 0, scale: 0.9, duration: 1.0, ease: "power2.out" }, 0.2);

      // Section label
      tl.from("#section-label", { opacity: 0, y: -14, duration: 0.35, ease: "power3.out" }, 0.15);

      // Headline from left
      tl.from("#headline", { opacity: 0, x: -55, duration: 0.5, ease: "expo.out" }, 0.3);

      // Body copy
      tl.from("#body-copy", { opacity: 0, y: 20, duration: 0.4, ease: "sine.out" }, 0.7);

      // Rows stagger from left
      tl.from("#fw-row-hooks",  { opacity: 0, x: -40, duration: 0.45, ease: "power2.out" }, 1.0);
      tl.from("#fw-row-bodies", { opacity: 0, x: -40, duration: 0.45, ease: "power2.out" }, 1.2);
      tl.from("#fw-row-ctas",   { opacity: 0, x: -40, duration: 0.45, ease: "power2.out" }, 1.4);

      // Pills stagger within each row
      tl.from("#p-h1", { opacity: 0, scale: 0.8, duration: 0.3, ease: "back.out(1.5)" }, 1.1);
      tl.from("#p-h2", { opacity: 0, scale: 0.8, duration: 0.3, ease: "back.out(1.5)" }, 1.18);
      tl.from("#p-h3", { opacity: 0, scale: 0.8, duration: 0.3, ease: "back.out(1.5)" }, 1.26);
      tl.from("#p-h4", { opacity: 0, scale: 0.8, duration: 0.3, ease: "back.out(1.5)" }, 1.34);
      tl.from("#p-h5", { opacity: 0, scale: 0.8, duration: 0.3, ease: "back.out(1.5)" }, 1.42);

      tl.from("#p-b1", { opacity: 0, scale: 0.8, duration: 0.3, ease: "power3.out" }, 1.3);
      tl.from("#p-b2", { opacity: 0, scale: 0.8, duration: 0.3, ease: "power3.out" }, 1.38);
      tl.from("#p-b3", { opacity: 0, scale: 0.8, duration: 0.3, ease: "power3.out" }, 1.46);

      tl.from("#p-c1", { opacity: 0, scale: 0.8, duration: 0.3, ease: "expo.out" }, 1.5);
      tl.from("#p-c2", { opacity: 0, scale: 0.8, duration: 0.3, ease: "expo.out" }, 1.58);
      tl.from("#p-c3", { opacity: 0, scale: 0.8, duration: 0.3, ease: "expo.out" }, 1.66);

      // Swipe chevron + footer
      tl.from("#swipe-chevron", { opacity: 0, x: 12, duration: 0.35, ease: "power2.out" }, 1.7);
      tl.from("#footer", { opacity: 0, duration: 0.4, ease: "sine.out" }, 1.8);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
