<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=720, height=900" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;900&family=Manrope:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&family=JetBrains+Mono:wght@400;700&display=swap');

      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        margin: 0;
        width: 720px;
        height: 900px;
        overflow: hidden;
        background: #0D0D0D;
      }

      .slide {
        width: 720px;
        height: 900px;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 80px 50px 45px 50px;
      }

      /* Avatar */
      .avatar-wrap {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        border: 4px solid #ED0D51;
        overflow: hidden;
        flex-shrink: 0;
      }
      .avatar-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        display: block;
      }

      /* Label */
      .cta-label {
        font-family: 'Manrope', sans-serif;
        font-weight: 700;
        font-size: 16px;
        color: #A8A8A8;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        margin-top: 22px;
      }

      /* Headline */
      .headline-block {
        margin-top: 20px;
        text-align: center;
        line-height: 1.1;
      }
      .headline-line1 {
        font-family: 'Manrope', sans-serif;
        font-weight: 700;
        font-size: 44px;
        color: #fff;
        display: block;
      }
      .headline-line2 {
        font-family: 'Manrope', sans-serif;
        font-weight: 700;
        font-style: italic;
        font-size: 44px;
        color: #fff;
        display: block;
      }

      /* Body */
      .body-copy {
        font-family: 'Manrope', sans-serif;
        font-weight: 400;
        font-size: 18px;
        color: #A8A8A8;
        text-align: center;
        max-width: 520px;
        line-height: 1.55;
        margin-top: 24px;
      }

      /* CTA Button */
      .cta-btn {
        margin-top: 32px;
        background: #ED0D51;
        border-radius: 40px;
        padding: 16px 44px;
        display: inline-flex;
        align-items: center;
        flex-shrink: 0;
      }
      .cta-btn-text {
        font-family: 'Manrope', sans-serif;
        font-weight: 700;
        font-size: 20px;
        color: #0D0D0D;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        white-space: nowrap;
      }

      /* Spacer */
      .spacer { flex: 1; }

      /* Footer */
      .footer {
        display: flex;
        align-items: center;
        width: 100%;
        gap: 14px;
      }
      .footer-handle {
        font-family: 'Manrope', sans-serif;
        font-weight: 600;
        font-size: 14px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #A8A8A8;
        white-space: nowrap;
      }
      .progress-bar {
        flex: 1;
        height: 3px;
        background: #2A2A2A;
        border-radius: 2px;
        overflow: hidden;
        position: relative;
      }
      .progress-fill {
        position: absolute;
        left: 0;
        top: 0;
        height: 100%;
        width: [PROGRESS]%;
        background: #ED0D51;
        border-radius: 2px;
      }
      .page-num {
        font-family: 'Manrope', sans-serif;
        font-weight: 600;
        font-size: 18px;
        color: #A8A8A8;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="10"
      data-width="720"
      data-height="900"
    >
      <div id="s1" class="clip" data-start="0" data-duration="10" data-track-index="1">
        <div class="slide">

          <div class="avatar-wrap" id="avatar">
            <img src="assets/avatar.png" alt="" />
          </div>

          <div class="cta-label" id="cta-label">[CTA_LABEL]</div>

          <div class="headline-block">
            <span class="headline-line1" id="h1">[HEADLINE_LINE_1]</span>
            <span class="headline-line2" id="h2">[HEADLINE_LINE_2]</span>
          </div>

          <p class="body-copy" id="body-copy">
            [BODY_COPY]
          </p>

          <div class="cta-btn" id="cta-btn">
            <span class="cta-btn-text">Comment '[KEYWORD]'</span>
          </div>

          <div class="spacer"></div>

          <div class="footer" id="footer">
            <span class="footer-handle">[@YOUR_HANDLE]</span>
            <div class="progress-bar">
              <div class="progress-fill"></div>
            </div>
            <span class="page-num">[N]/[TOTAL]</span>
          </div>

        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Avatar drops in with back.out bounce
      tl.from("#avatar", { y: -60, opacity: 0, duration: 0.5, ease: "back.out(1.4)" }, 0.2);

      // Label fades up
      tl.from("#cta-label", { y: 20, opacity: 0, duration: 0.5, ease: "power2.out" }, 0.5);

      // Headline lines stagger in
      tl.from("#h1", { y: 30, opacity: 0, duration: 0.55, ease: "power3.out" }, 0.7);
      tl.from("#h2", { y: 30, opacity: 0, duration: 0.55, ease: "power3.out" }, 0.85);

      // Body copy
      tl.from("#body-copy", { y: 20, opacity: 0, duration: 0.5, ease: "sine.out" }, 1.1);

      // CTA button scales in with back.out snap
      tl.from("#cta-btn", { scale: 0.72, opacity: 0, duration: 0.45, ease: "back.out(1.7)" }, 1.4);

      // Button pulse: scale 1 -> 1.03 -> 1, repeat 3, starts at 2.0s
      tl.to("#cta-btn", {
        scale: 1.03,
        duration: 1,
        ease: "sine.inOut",
        yoyo: true,
        repeat: 3
      }, 2.0);

      // Footer slides up
      tl.from("#footer", { y: 18, opacity: 0, duration: 0.45, ease: "sine.out" }, 1.8);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
