<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=720, height=900" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;900&family=Manrope:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&family=JetBrains+Mono:wght@400;700&display=swap');
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 720px;
        height: 900px;
        overflow: hidden;
        background: #0D0D0D;
      }

      .scene-content {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
        padding: 60px 50px 50px 50px;
        box-sizing: border-box;
        overflow: hidden;
      }

      .section-label {
        font-family: 'Manrope', sans-serif;
        font-weight: 700;
        font-size: 13px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: #ED0D51;
        margin-bottom: 14px;
        flex-shrink: 0;
      }

      /* PINK HERO PANEL — the paradigm-shift statement lives here */
      .hero-panel {
        background: #ED0D51;
        border-radius: 16px;
        padding: 36px 32px;
        margin-bottom: 22px;
        flex-shrink: 0;
      }

      .headline {
        font-family: 'Big Shoulders Display', sans-serif;
        font-weight: 900;
        font-size: 90px;
        line-height: 0.9;
        letter-spacing: -0.02em;
        color: #0D0D0D;
        text-transform: uppercase;
      }

      .body-copy {
        font-family: 'Manrope', sans-serif;
        font-weight: 400;
        font-style: italic;
        font-size: 18px;
        line-height: 1.5;
        color: #A8A8A8;
        margin-top: 4px;
        margin-bottom: 18px;
        max-width: 560px;
        flex-shrink: 0;
      }

      .cards-area {
        display: flex;
        flex-direction: column;
        gap: 12px;
        flex: 1;
        min-height: 0;
      }

      .metric-card {
        background: #1A1A1A;
        border-left: 3px solid #ED0D51;
        border-radius: 12px;
        padding: 20px;
        display: flex;
        align-items: center;
        gap: 20px;
        flex-shrink: 0;
      }

      .card-abbr {
        font-family: 'Big Shoulders Display', sans-serif;
        font-weight: 900;
        font-size: 48px;
        line-height: 1;
        flex-shrink: 0;
        width: 70px;
        color: #ED0D51;
      }

      .card-right-col {
        display: flex;
        flex-direction: column;
        gap: 4px;
        flex: 1;
        min-width: 0;
      }

      .card-title {
        font-family: 'Manrope', sans-serif;
        font-weight: 700;
        font-size: 16px;
        color: #ffffff;
      }

      .card-desc {
        font-family: 'Manrope', sans-serif;
        font-weight: 400;
        font-size: 14px;
        color: #A8A8A8;
        line-height: 1.4;
      }

      .footer {
        display: flex;
        align-items: center;
        width: 100%;
        margin-top: 18px;
        flex-shrink: 0;
      }
      .footer-handle {
        font-family: 'Manrope', sans-serif;
        font-weight: 700;
        font-size: 13px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #888888;
      }
      .footer-progress {
        display: flex;
        align-items: center;
        gap: 12px;
        flex: 1;
        margin-left: 16px;
      }
      .progress-bar {
        flex: 1;
        height: 3px;
        background: #2A2A2A;
        border-radius: 2px;
        overflow: hidden;
        position: relative;
      }
      .progress-fill {
        position: absolute;
        left: 0; top: 0;
        height: 100%;
        width: [PROGRESS]%;
        background: #ED0D51;
        border-radius: 2px;
      }
      .page-num {
        font-family: 'Manrope', sans-serif;
        font-weight: 700;
        font-size: 16px;
        color: #888888;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="5" data-width="720" data-height="900">
      <div id="s1" class="clip" data-start="0" data-duration="5" data-track-index="1">
        <div class="scene-content">

          <div class="section-label" id="section-label">[SECTION_LABEL]</div>

          <div class="hero-panel" id="hero-panel">
            <div class="headline" id="headline">[HEADLINE]</div>
          </div>

          <div class="body-copy" id="body-copy">[BODY_COPY]</div>

          <div class="cards-area">

            <div class="metric-card" id="card-1">
              <div class="card-abbr">[ABBR_1]</div>
              <div class="card-right-col">
                <div class="card-title">[CARD_1_TITLE]</div>
                <div class="card-desc">[CARD_1_DESC]</div>
              </div>
            </div>

            <div class="metric-card" id="card-2">
              <div class="card-abbr">[ABBR_2]</div>
              <div class="card-right-col">
                <div class="card-title">[CARD_2_TITLE]</div>
                <div class="card-desc">[CARD_2_DESC]</div>
              </div>
            </div>

            <div class="metric-card" id="card-3">
              <div class="card-abbr">[ABBR_3]</div>
              <div class="card-right-col">
                <div class="card-title">[CARD_3_TITLE]</div>
                <div class="card-desc">[CARD_3_DESC]</div>
              </div>
            </div>

          </div>

          <div class="footer" id="footer">
            <span class="footer-handle">[@YOUR_HANDLE]</span>
            <div class="footer-progress">
              <div class="progress-bar"><div class="progress-fill"></div></div>
              <span class="page-num">[N]/[TOTAL]</span>
            </div>
          </div>

        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Section label (0.15s, power3.out)
      tl.from("#section-label", { opacity: 0, y: -14, duration: 0.35, ease: "power3.out" }, 0.15);

      // Hero panel scales in (0.3s, back.out — gives it the punch)
      tl.from("#hero-panel", { opacity: 0, scale: 0.92, duration: 0.55, ease: "back.out(1.3)" }, 0.3);

      // Body copy (0.7s, sine.out)
      tl.from("#body-copy", { opacity: 0, y: 16, duration: 0.4, ease: "sine.out" }, 0.85);

      // Cards stagger from bottom (1.0s, 0.15s apart, power2.out)
      tl.from("#card-1", { opacity: 0, y: 35, duration: 0.45, ease: "power2.out" }, 1.0);
      tl.from("#card-2", { opacity: 0, y: 35, duration: 0.45, ease: "power2.out" }, 1.15);
      tl.from("#card-3", { opacity: 0, y: 35, duration: 0.45, ease: "power2.out" }, 1.3);

      // Footer (1.7s, sine.out)
      tl.from("#footer", { opacity: 0, duration: 0.35, ease: "sine.out" }, 1.7);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
