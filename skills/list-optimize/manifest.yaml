description: "Qualify, normalize, research, and personalize a scraped lead list before campaign launch. Bundles 9 shell scripts (qualify.sh, normalize-company.sh, research.sh, personalize.sh, run-pipeline.sh, validate-campaign-vars.sh, migrate-schema.sh + db-query.sh helper). Interactive phase picker. Validates target Instantly/Email Bison campaign template carries the personalization variable + fallback before any DB writes. Updates Turso leads table with qualification + normalization + personalization fields. Requires the lead-tracking-db skill (provides db-setup.sh + V1 schema)."
