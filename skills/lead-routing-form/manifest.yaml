id: lead-routing-form
type: skill
name: "Lead Routing Form"
description: "Interview-driven installer that builds a qualification → routing → calendar booking form and drops it into your website. A lead answers a few questions; a lead-score (or hard rules) routes them to the right salesperson's calendar — or a soft-DQ card with a downsell. Backend-free: it POSTs 4 events (lander_optin / partial_submission / qualified / disqualified) to ONE webhook you supply (n8n/Zapier/Make/GHL/custom). No database, no API keys. Produces a self-contained vanilla embed (any site) OR a Next.js/React drop-in. The same engine that powers Lead Gen Jay's /book-a-call."
