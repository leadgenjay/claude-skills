name: "Fathom KB — Coaching Call Processor"
description: "Process coaching call transcripts from Fathom into structured Obsidian knowledge notes. Pulls transcripts via Fathom MCP, feeds to NotebookLM for deep extraction, generates categorized Obsidian notes (frameworks, strategies, objections, lessons), and commits to the knowledge base repo. Use when the user says 'coaching call', 'process call', 'extract coaching', 'fathom transcript', 'coaching notes', 'process coaching', or 'extract framework from call'."
