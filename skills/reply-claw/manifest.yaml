id: reply-claw
type: skill
name: "Reply Claw"
description: "Interactive setup wizard that deploys a 24/7 cold-email reply agent on nanoclaw. Classifies every reply into 11 categories, applies 8 custom Bison funnel tags (Interested, Hard No, Soft No, Auto Reply, Follow up 7d / 30d, Booked, Lead Magnet) to each lead automatically. Interviews you about your company + ICP, generates per-tenant KB, validates API keys, and ships a parameterized fork of bison-replies to your Zeus host."
